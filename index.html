<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7efe8">
<title>每日打卡</title>
<style>
:root{--accent:#df7951;--accent-soft:#fff4ec;--ink:#332a28;--muted:#967d74;--line:rgba(92,69,58,.1)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:#f3ece5;line-height:1.5}.app{min-height:100vh;background:radial-gradient(circle at 8% 0,rgba(126,175,153,.16),transparent 32%),radial-gradient(circle at 92% 10%,rgba(223,121,81,.14),transparent 30%),linear-gradient(160deg,#fbf7f0,#eee6dc)}.shell{width:min(100%,552px);margin:0 auto;padding:18px 16px 108px}.topline{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.greet{font-size:13px;color:var(--muted)}.music{width:38px;height:38px;border:0;border-radius:50%;background:rgba(255,255,255,.86);color:var(--muted);box-shadow:0 8px 22px rgba(74,54,45,.08);font-size:18px}.music.on{background:var(--accent);color:#fff;animation:spin 3s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.mode-tabs{height:36px;display:grid;grid-template-columns:repeat(3,1fr);align-items:end;margin:0 0 14px;border-bottom:1px solid var(--line)}.mode-tab{height:35px;border:0;background:transparent;color:#9b8982;font:inherit;font-size:14px;position:relative}.mode-tab.active{color:var(--ink);font-weight:750}.mode-tab.active:after{content:"";position:absolute;left:24%;right:24%;bottom:-1px;height:3px;border-radius:99px;background:var(--accent)}.hero,.card,.habit,.calendar-panel,.quote-box,.settings{background:rgba(255,255,255,.78);border:1px solid var(--line);box-shadow:0 12px 30px rgba(72,52,43,.08);backdrop-filter:blur(12px)}.hero{border-radius:24px;padding:16px 17px;margin-bottom:12px}.title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.title{margin:0;font-size:28px;line-height:1.08}.date{font-size:13px;color:var(--muted);margin-top:4px}.score{min-width:68px;text-align:center;border-radius:18px;background:var(--accent-soft);padding:8px 9px}.score b{display:block;color:var(--accent);font-size:23px;line-height:1}.score span{font-size:11px;color:var(--muted)}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:14px}.sum{background:#fff;border-radius:14px;text-align:center;padding:8px 4px}.sum b{display:block;color:var(--accent);font-size:19px;line-height:1.1}.sum span{font-size:11px;color:var(--muted)}.bar{height:9px;border-radius:99px;background:#eadfd7;overflow:hidden;margin-top:12px}.bar span{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,var(--accent),#e9b15e);transition:width .3s}.cal-toggle{height:42px;width:100%;border:0;border-radius:16px;background:rgba(255,255,255,.82);box-shadow:0 8px 20px rgba(72,52,43,.06);display:flex;align-items:center;justify-content:center;gap:9px;color:#836b62;font:inherit;margin-bottom:10px}.cal-toggle b{color:var(--accent)}.calendar-panel{border-radius:22px;padding:15px;margin-bottom:12px;display:none}.calendar-panel.show{display:block}.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.cal-title{font-weight:800}.icon{width:38px;height:38px;border:0;border-radius:50%;background:var(--accent-soft);color:var(--accent);font:inherit;font-size:18px}.week,.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.week{text-align:center;color:var(--muted);font-size:12px;margin-bottom:5px}.day{height:34px;border:0;background:transparent;color:#463936;display:grid;place-items:center;font:inherit;font-size:13px;position:relative}.day.today{font-weight:800;color:var(--accent)}.day.hit:after,.day.rest:after{content:"";position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--accent)}.day.rest:after{background:#7eaf99}.push{border-radius:20px;padding:12px 13px;margin-bottom:10px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}.section-head h2{font-size:16px;margin:0}.small{font-size:12px;color:var(--muted)}.push-card{display:grid;grid-template-columns:44px 1fr auto auto;gap:9px;align-items:center;border-radius:17px;background:#fff;padding:10px}.emoji{width:44px;height:44px;border-radius:14px;background:var(--accent-soft);display:grid;place-items:center;font-size:24px}.push-name{font-weight:800;font-size:15px}.push-meta{font-size:12px;color:var(--muted);margin-top:1px}.btn,.check,.del,.music,.mode-tab,.cal-toggle,.day,.icon{cursor:pointer;transition:transform .12s ease,opacity .2s,background .2s}.btn:active,.check:active,.del:active,.music:active,.mode-tab:active,.cal-toggle:active,.day:active,.icon:active{transform:scale(.97)}.mini-btn{height:36px;min-width:36px;border:0;border-radius:14px;background:var(--accent-soft);color:var(--accent);font:inherit}.mini-btn.primary{background:var(--accent);color:#fff;padding:0 12px}.mini-btn:disabled{opacity:.42;cursor:not-allowed}.list{display:grid;gap:9px;margin:10px 0}.habit{border-radius:18px;padding:11px;display:grid;grid-template-columns:40px 1fr auto auto;gap:9px;align-items:center}.habit .emoji{width:40px;height:40px;border-radius:13px;font-size:22px}.name{font-size:15px;font-weight:760}.meta{font-size:12px;color:var(--muted)}.habit.done{opacity:.62}.habit.done .name{text-decoration:line-through}.check{width:38px;height:38px;border-radius:50%;border:2px solid #ded0c7;background:#fff;color:transparent;font-size:17px}.check.done{background:var(--accent);border-color:var(--accent);color:#fff}.del{width:30px;height:30px;border:0;border-radius:50%;background:#fff;color:#b98778;font-size:17px}.empty{border-radius:18px;background:rgba(255,255,255,.72);padding:24px 16px;text-align:center;color:var(--muted)}.add{display:grid;grid-template-columns:1fr 48px;gap:9px;margin:13px 0 10px}.add input{height:48px;border-radius:16px;border:1px solid #dfd1c7;background:#fff;padding:0 14px;font:inherit;outline:none;color:var(--ink)}.add input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(223,121,81,.12)}.add .btn{border:0;border-radius:16px;background:var(--accent);color:#fff;font-size:24px}.quote-box{border-radius:17px;padding:13px 15px;border-left:4px solid var(--accent);font-size:14px;color:#6f5a52;margin-bottom:12px}.settings{margin-top:12px;border-radius:20px;padding:13px;display:flex;align-items:center;justify-content:space-between}.switch{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}.switch input{accent-color:var(--accent)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .3s;z-index:30}.overlay.show{opacity:1;pointer-events:auto}.drawer{position:fixed;top:0;right:0;width:min(100%,320px);height:100vh;background:#fffaf5;z-index:31;transform:translateX(100%);transition:transform .3s ease;box-shadow:-18px 0 40px rgba(45,35,31,.2);padding:18px;display:flex;flex-direction:column;gap:12px}.drawer.show{transform:translateX(0)}.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.drawer h2{margin:0;font-size:21px}.diary-top{border-radius:17px;background:var(--accent-soft);padding:12px;color:#6f5a52}.timeline{display:grid;gap:8px;max-height:190px;overflow:auto}.time-item{border-radius:14px;background:#fff;padding:9px 10px;font-size:13px;border:1px solid var(--line)}.diary{min-height:150px;resize:vertical;border:1px solid #dfd1c7;border-radius:16px;background:#fff;padding:12px;font:inherit;outline:none}.weather{height:38px;border:1px solid #dfd1c7;border-radius:14px;background:#fff;padding:0 12px;font:inherit}.toast{position:fixed;left:50%;bottom:24px;z-index:45;transform:translate(-50%,80px);opacity:0;background:#332a28;color:#fff;padding:10px 16px;border-radius:14px;font-size:14px;transition:.25s}.toast.show{opacity:1;transform:translate(-50%,0)}.confetti{position:fixed;inset:0;pointer-events:none;z-index:44;overflow:hidden}.confetti i{position:absolute;top:-12px;width:7px;height:10px;border-radius:2px;background:var(--accent);animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(580deg);opacity:0}}@media(min-width:760px){.shell{padding-top:28px}.app{display:flex;justify-content:center}.drawer{width:320px}}@media(max-width:420px){.shell{padding-left:13px;padding-right:13px}.title{font-size:25px}.summary{gap:6px}.habit{grid-template-columns:40px 1fr auto}.del{grid-column:4}.push-card{grid-template-columns:42px 1fr auto auto}.drawer{width:100%}}
</style>
</head>
<body>
<div class="app">
  <main class="shell">
    <div class="topline"><div class="greet" id="greet"></div><button class="music" id="musicBtn" title="背景音乐">♪</button></div>
    <nav class="mode-tabs" id="modeTabs"></nav>
    <section class="hero">
      <div class="title-row"><div><h1 class="title">每日打卡</h1><div class="date" id="dateText"></div></div><div class="score"><b id="scoreText">0</b><span>今日积分</span></div></div>
      <div class="summary"><div class="sum"><b id="doneCount">0</b><span>已完成</span></div><div class="sum"><b id="totalCount">0</b><span>今日任务</span></div><div class="sum"><b id="streakCount">0</b><span>连续</span></div><div class="sum"><b id="monthCount">0</b><span>本月</span></div></div>
      <div class="bar"><span id="bar"></span></div>
    </section>
    <button class="cal-toggle" id="calToggle">📅 <span>打卡日历</span><b id="calSummary">0天</b></button>
    <section class="calendar-panel" id="calendar">
      <div class="cal-top"><button class="icon" id="prevMonth">‹</button><div class="cal-title" id="calTitle"></div><button class="icon" id="nextMonth">›</button></div>
      <div class="week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
      <div class="cal-grid" id="calGrid"></div>
    </section>
    <section class="card push">
      <div class="section-head"><h2>今日推荐</h2><span class="small" id="skipHint"></span></div>
      <div id="pushBox"></div>
      <div class="small" id="suggestBox" hidden></div>
    </section>
    <section class="list" id="habitList"></section>
    <div class="add"><input id="habitInput" maxlength="24" placeholder="添加今日任务..."><button class="btn" id="addBtn">+</button></div>
    <div class="quote-box" id="quoteBox"></div>
    <section class="settings"><div><b>本地智能建议</b><div class="small">纯前端规则，不发送网络请求</div></div><label class="switch"><input type="checkbox" id="aiToggle">开启</label></section>
  </main>
</div>
<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head"><div><h2 id="drawerTitle"></h2><div class="small" id="drawerSub"></div></div><button class="icon" id="closeDrawer">×</button></div>
  <div class="diary-top" id="diaryTop"></div>
  <input class="weather" id="weatherInput" placeholder="天气 / 心情，例如：晴，平静">
  <div><b>完成时间线</b><div class="timeline" id="timeline"></div></div>
  <textarea class="diary" id="diaryText" placeholder="写下今天完成了什么，感受如何..."></textarea>
</aside>
<audio id="bgm" loop preload="none"><source src="background.mp3" type="audio/mpeg"></audio>
<div class="toast" id="toast"></div>
<script>
(function(){
var STORE='daily-checkin-v2',OLD='daily-checkin-v1',week=['日','一','二','三','四','五','六'],activeDate=null,viewMonth=new Date(),calendarOpen=false,celebratedKey='';
var quotes=['种一棵树最好的时间是十年前，其次是现在。','不经一番寒彻骨，怎得梅花扑鼻香。','表扬你的坚持 🏅','生命必须有裂缝，阳光才能照进来 🌄','功不唐捐，玉汝于成。','道阻且长，行则将至。','长风破浪会有时。','今天也比昨天多了一点点。','小小坚持，大大改变。','自律即自由。','不积跬步，无以至千里。','你比想象中更强大。','把目标拆小，把坚持变成日常。','完成一次，就多一点底气。','认真生活的人，会被时间奖励。','锲而不舍，金石可镂。','天行健，君子以自强不息。','宝剑锋从磨砺出。','坚持不是口号，是今天这一勾。','慢慢来，比较快。','做完这一步，世界就亮一点。','给今天一个温柔但坚定的答案。','哪怕只完成一点，也算向前。','每一次打卡都在替未来铺路。','稳住，节奏比速度更重要。','今天的小胜利值得被记住。','一日一进，月月不同。','你正在成为更可靠的自己。','先开始，再变好。','春有百花秋有月，日日坚持皆风景。'];
var defaultHabits=[
 {id:'read',name:'阅读20分钟',emoji:'📖',modeIds:['focus','learn'],energy:'low',category:'learn',weekendBonus:true,history:{}},
 {id:'meditate',name:'冥想5分钟',emoji:'🧘',modeIds:['focus','rest'],energy:'low',category:'rest',history:{}},
 {id:'write',name:'写作一页',emoji:'✍️',modeIds:['focus'],energy:'high',category:'create',history:{}},
 {id:'stretch',name:'拉伸放松',emoji:'🧎',modeIds:['rest'],energy:'low',category:'rest',history:{}},
 {id:'water',name:'喝水',emoji:'💧',modeIds:['rest'],energy:'low',category:'body',history:{}},
 {id:'breath',name:'深呼吸',emoji:'🌿',modeIds:['rest'],energy:'low',category:'rest',history:{}},
 {id:'lesson',name:'听课30分钟',emoji:'🎧',modeIds:['learn'],energy:'high',category:'learn',history:{}},
 {id:'calligraphy',name:'练字10分钟',emoji:'🖋️',modeIds:['learn'],energy:'low',category:'skill',weekendBonus:true,history:{}}
];
var defaultModes={focus:{id:'focus',name:'专注',accent:'#df7951',habitIds:['read','meditate','write']},rest:{id:'rest',name:'恢复',accent:'#81b98f',habitIds:['stretch','water','breath','meditate']},learn:{id:'learn',name:'学习',accent:'#e7b84d',habitIds:['read','lesson','calligraphy']}};
var state=load(),els={tabs:id('modeTabs'),greet:id('greet'),date:id('dateText'),score:id('scoreText'),done:id('doneCount'),total:id('totalCount'),streak:id('streakCount'),month:id('monthCount'),bar:id('bar'),calToggle:id('calToggle'),calSummary:id('calSummary'),calendar:id('calendar'),push:id('pushBox'),skip:id('skipHint'),suggest:id('suggestBox'),input:id('habitInput'),list:id('habitList'),quote:id('quoteBox'),calTitle:id('calTitle'),cal:id('calGrid'),toast:id('toast'),drawer:id('drawer'),overlay:id('overlay'),drawerTitle:id('drawerTitle'),drawerSub:id('drawerSub'),diaryTop:id('diaryTop'),timeline:id('timeline'),diary:id('diaryText'),weather:id('weatherInput'),ai:id('aiToggle'),bgm:id('bgm'),music:id('musicBtn')};
function id(x){return document.getElementById(x)}function pad(n){return String(n).padStart(2,'0')}function key(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}function today(){return key(new Date())}function mkey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)}function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function load(){var data=null;try{data=JSON.parse(localStorage.getItem(STORE)||'null')}catch(e){}if(data&&data.version===2)return normalize(data);return migrate()}
function migrate(){var old=null;try{old=JSON.parse(localStorage.getItem(OLD)||'null')}catch(e){}var habits=defaultHabits.map(function(h){return Object.assign({},h,{history:Object.assign({},h.history)})});if(old&&old.habits){old.habits.forEach(function(h){var nh={id:'old-'+h.id,name:h.name,emoji:h.emoji||emojiFor(h.name),modeIds:['focus'],energy:'low',category:'custom',history:h.history||{}};habits.push(nh);defaultModes.focus.habitIds.push(nh.id)})}var s={version:2,activeMode:'focus',modes:defaultModes,habits:habits,dailyLog:{},skipLog:{},todayTasks:{},settings:{smart:true,currentPush:{},quoteIndex:0}};backfillDailyLog(s);return normalize(s)}
function normalize(s){s.modes=s.modes||defaultModes;s.habits=s.habits||[];s.dailyLog=s.dailyLog||{};s.skipLog=s.skipLog||{};s.todayTasks=s.todayTasks||{};s.settings=s.settings||{};if(s.settings.smart!==false)s.settings.smart=true;if(!s.activeMode||!s.modes[s.activeMode])s.activeMode='focus';if(!s.settings.currentPush)s.settings.currentPush={};if(typeof s.settings.quoteIndex!=='number')s.settings.quoteIndex=0;return s}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function backfillDailyLog(s){s.habits.forEach(function(h){Object.keys(h.history||{}).forEach(function(k){var log=s.dailyLog[k]||(s.dailyLog[k]={items:[],diary:'',weather:''});if(!log.items.some(function(i){return i.habitId===h.id}))log.items.push({habitId:h.id,name:h.name,emoji:h.emoji,time:k+'T20:00:00',energy:h.energy,category:h.category})})})}
function mode(){return state.modes[state.activeMode]}function modeHabits(){var mo=mode();return state.habits.filter(function(h){return (h.modeIds||[]).indexOf(mo.id)>-1||mo.habitIds.indexOf(h.id)>-1})}
function taskKey(){return today()+'|'+state.activeMode}function todayTaskIds(){var k=taskKey();state.todayTasks[k]=state.todayTasks[k]||[];return state.todayTasks[k]}function todayTasks(){var ids=todayTaskIds();return ids.map(function(idv){return state.habits.find(function(h){return h.id===idv})}).filter(Boolean)}
function logFor(k){return state.dailyLog[k]||(state.dailyLog[k]={items:[],diary:'',weather:''})}function skipFor(k,mid){state.skipLog[k]=state.skipLog[k]||{};return state.skipLog[k][mid]||(state.skipLog[k][mid]={ids:[],count:0,rest:false})}
function toast(t){els.toast.textContent=t;els.toast.classList.add('show');clearTimeout(els.toast._t);els.toast._t=setTimeout(function(){els.toast.classList.remove('show')},1700)}
function emojiFor(n){var rules=[[['水','喝'],'💧'],[['读','书'],'📖'],[['写','日记'],'✍️'],[['睡'],'🌙'],[['运动','跑'],'🏃'],[['学','课'],'📚'],[['拉伸'],'🧎']];for(var i=0;i<rules.length;i++){for(var j=0;j<rules[i][0].length;j++){if(n.indexOf(rules[i][0][j])>-1)return rules[i][1]}}return'⭐'}
function attrFor(name){if(/跑|运动|听课|写作/.test(name))return{energy:'high',category:'learn'};if(/拉伸|喝水|呼吸|冥想|睡/.test(name))return{energy:'low',category:'rest'};if(/读|课|练|学/.test(name))return{energy:'low',category:'learn'};return{energy:'low',category:'custom'}}
function refreshQuote(){state.settings.quoteIndex=(state.settings.quoteIndex+1+Math.floor(Math.random()*7))%quotes.length}
function render(){var mo=mode();document.documentElement.style.setProperty('--accent',mo.accent);document.documentElement.style.setProperty('--accent-soft',soft(mo.accent));els.ai.checked=state.settings.smart!==false;renderTabs();renderTop();ensurePush();renderPush();renderSuggestion();renderList();renderQuote();renderCal();if(activeDate)renderDrawer(activeDate);save()}
function soft(c){if(c==='#81b98f')return'#e8f5e9';if(c==='#e7b84d')return'#fff8e1';return'#fff4ec'}
function renderTabs(){els.tabs.innerHTML=Object.keys(state.modes).map(function(k){var m=state.modes[k];return'<button class="mode-tab '+(k===state.activeMode?'active':'')+'" data-mode="'+k+'">'+esc(m.name)+'</button>'}).join('')}
function renderTop(){var d=new Date(),tk=today(),tasks=todayTasks(),done=tasks.filter(function(h){return h.history&&h.history[tk]}).length,total=tasks.length,month=0,best=0;modeHabits().forEach(function(h){month+=Object.keys(h.history||{}).filter(function(k){return k.indexOf(mkey(d))===0}).length;best=Math.max(best,streak(h.history||{}))});els.greet.textContent=timeIcon(d)+' '+greeting(d);els.date.textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+week[d.getDay()];els.done.textContent=done;els.total.textContent=total;els.streak.textContent=best;els.month.textContent=month;els.score.textContent=done*10;els.bar.style.width=(total?Math.round(done/total*100):0)+'%';maybeCelebrate(done,total)}
function timeIcon(d){var h=d.getHours();return h>=18||h<6?'🌙':'☀️'}function greeting(d){var h=d.getHours();if(h<9)return'早上好，开启新一天';if(h<12)return'上午好，稳稳推进';if(h<14)return'中午好，给自己充电';if(h<18)return'下午好，继续一点点';if(h<22)return'晚上好，别忘了打卡';return'今天辛苦了'}
function streak(hist){var c=0,d=new Date();while(hist[key(d)]||isRest(key(d))){c++;d.setDate(d.getDate()-1)}return c}function isRest(k){return Object.keys(state.skipLog[k]||{}).some(function(m){return state.skipLog[k][m].rest})}
function ensurePush(){var tk=today(),mid=state.activeMode,hs=availablePool(),cur=state.settings.currentPush[tk+'|'+mid];if(cur&&hs.some(function(h){return h.id===cur}))return;if(hs.length)state.settings.currentPush[tk+'|'+mid]=hs[Math.floor(Math.random()*hs.length)].id}
function availablePool(){var sk=skipFor(today(),state.activeMode),tasks=todayTaskIds();return modeHabits().filter(function(h){return sk.ids.indexOf(h.id)<0&&tasks.indexOf(h.id)<0})}function currentPush(){var idv=state.settings.currentPush[today()+'|'+state.activeMode];return state.habits.find(function(h){return h.id===idv})}
function renderPush(){var sk=skipFor(today(),state.activeMode),h=currentPush();els.skip.textContent='换一个 '+sk.count+'/10';if(sk.rest){els.push.innerHTML='<div class="empty">今日已无可用习惯，休息一天</div>';return}if(!h){els.push.innerHTML='<div class="empty">当前模式没有可推荐任务，可以手动添加</div>';return}els.push.innerHTML='<div class="push-card"><div class="emoji">'+h.emoji+'</div><div><div class="push-name">'+esc(h.name)+'</div><div class="push-meta">'+(h.energy==='high'?'高能量':'低能量')+' · '+esc(h.category)+'</div></div><button class="mini-btn" id="swapBtn" '+(sk.count>=10?'disabled':'')+'>↻</button><button class="mini-btn primary" id="joinBtn">加入</button></div>'}
function renderSuggestion(){if(state.settings.smart===false){els.suggest.hidden=true;return}var s=suggest();if(!s){els.suggest.hidden=true;return}els.suggest.hidden=false;els.suggest.textContent=s}
function suggest(){var hs=modeHabits(),tk=today(),cur=currentPush();if(!hs.length)return null;var last3=[-1,-2,-3].map(dayKey).map(function(k){var l=state.dailyLog[k];return l&&l.items&&l.items[0]}).filter(Boolean);if(last3.length===3&&last3.every(function(i){return i.energy==='high'})){var low=hs.find(function(h){return h.energy==='low'||h.category==='rest'});if(low)return'这几天强度有点高，可以试试：'+low.name}var old=hs.find(function(h){var ds=Object.keys(h.history||{}).sort();return !ds.length||(new Date(tk)-new Date(ds[ds.length-1]))/86400000>=7});if(old)return'有个习惯好久没出现了：'+old.name;var y=skipFor(dayKey(-1),state.activeMode);if(cur&&y.ids.indexOf(cur.id)>-1){var alt=hs.find(function(h){return h.id!==cur.id&&h.energy===cur.energy});if(alt)return'昨天跳过了它，今天也可以换成：'+alt.name}var wd=new Date().getDay();if((wd===0||wd===6)&&Math.random()<.6){var w=hs.find(function(h){return h.weekendBonus});if(w)return'周末轻松一点，可以做：'+w.name}return null}
function dayKey(offset){var d=new Date();d.setDate(d.getDate()+offset);return key(d)}
function renderList(){var tk=today(),tasks=todayTasks();if(!tasks.length){els.list.innerHTML='<div class="empty">今日任务还是空的，先加入一个推荐吧</div>';return}els.list.innerHTML=tasks.map(function(h){var done=!!(h.history&&h.history[tk]);return'<article class="habit '+(done?'done':'')+'" data-id="'+h.id+'"><div class="emoji">'+h.emoji+'</div><div><div class="name">'+esc(h.name)+'</div><div class="meta">'+(h.energy==='high'?'高能量':'低能量')+' · '+streak(h.history||{})+'天连续</div></div><button class="check '+(done?'done':'')+'" data-a="toggle">✓</button><button class="del" data-a="remove">×</button></article>'}).join('')}
function renderQuote(){els.quote.textContent=quotes[state.settings.quoteIndex%quotes.length]}
function renderCal(){var y=viewMonth.getFullYear(),m=viewMonth.getMonth(),first=new Date(y,m,1),start=first.getDay(),days=new Date(y,m+1,0).getDate(),tk=today(),monthHits=0;els.calendar.classList.toggle('show',calendarOpen);els.calTitle.textContent=y+'年'+(m+1)+'月';var html='';for(var i=0;i<start;i++)html+='<div></div>';for(var d=1;d<=days;d++){var k=y+'-'+pad(m+1)+'-'+pad(d),hit=(state.dailyLog[k]&&state.dailyLog[k].items&&state.dailyLog[k].items.length),rest=isRest(k);if(hit||rest)monthHits++;html+='<button class="day '+(k===tk?'today ':'')+(hit?'hit ':'')+(rest?'rest':'')+'" data-date="'+k+'">'+d+'</button>'}els.cal.innerHTML=html;els.calSummary.textContent='本月'+monthHits+'天'}
function toggleHabit(idv){var h=state.habits.find(function(x){return x.id==idv});if(!h)return;var tk=today();h.history=h.history||{};var log=logFor(tk);if(h.history[tk]){delete h.history[tk];log.items=log.items.filter(function(i){return i.habitId!==h.id});toast('已取消')}else{h.history[tk]=true;log.items.push({habitId:h.id,name:h.name,emoji:h.emoji,time:new Date().toISOString(),energy:h.energy,category:h.category});refreshQuote();toast('打卡成功')}render()}
function addHabit(name){name=name.trim();if(!name)return;var a=attrFor(name),h={id:'h-'+Date.now(),name:name,emoji:emojiFor(name),modeIds:[state.activeMode],energy:a.energy,category:a.category,weekendBonus:false,history:{}};state.habits.push(h);state.modes[state.activeMode].habitIds.push(h.id);todayTaskIds().push(h.id);els.input.value='';refreshQuote();toast('已加入今日任务');render()}
function removeToday(idv){state.todayTasks[taskKey()]=todayTaskIds().filter(function(id){return id!==idv});toast('已移出今日任务');render()}
function joinPush(){var h=currentPush();if(!h)return;var ids=todayTaskIds();if(ids.indexOf(h.id)<0)ids.push(h.id);refreshQuote();toast('已加入今日任务');ensurePush();render()}
function swap(){var sk=skipFor(today(),state.activeMode),old=currentPush();if(sk.count>=10){toast('今日替换次数已用完');return}if(old&&sk.ids.indexOf(old.id)<0)sk.ids.push(old.id);sk.count++;var pool=availablePool();if(!pool.length){sk.rest=true;toast('今日主动休息');refreshQuote();render();return}var same=old&&pool.filter(function(h){return h.energy===old.energy});var low=pool.filter(function(h){return h.energy==='low'});var list=same&&same.length?same:(low.length?low:pool);state.settings.currentPush[today()+'|'+state.activeMode]=list[Math.floor(Math.random()*list.length)].id;refreshQuote();render()}
function maybeCelebrate(done,total){var ck=today()+'|'+state.activeMode;if(total>0&&done===total&&celebratedKey!==ck){celebratedKey=ck;calendarOpen=true;toast('恭喜完成今日打卡任务');confetti();setTimeout(function(){calendarOpen=false;renderCal()},2500)}}
function confetti(){var box=document.createElement('div');box.className='confetti';for(var i=0;i<42;i++){var p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.background=['#df7951','#e9b15e','#81b98f','#f0b8b8'][Math.floor(Math.random()*4)];p.style.animationDelay=Math.random()*.5+'s';p.style.animationDuration=(1.3+Math.random()*1.1)+'s';box.appendChild(p)}document.body.appendChild(box);setTimeout(function(){box.remove()},2600)}
function openDrawer(k){activeDate=k;els.overlay.classList.add('show');els.drawer.classList.add('show');els.drawer.setAttribute('aria-hidden','false');renderDrawer(k)}function closeDrawer(){activeDate=null;els.overlay.classList.remove('show');els.drawer.classList.remove('show');els.drawer.setAttribute('aria-hidden','true')}
function renderDrawer(k){var d=new Date(k+'T12:00:00'),log=logFor(k),items=log.items||[];els.drawerTitle.textContent=(d.getMonth()+1)+'月'+d.getDate()+'日';els.drawerSub.textContent='星期'+week[d.getDay()];els.diaryTop.innerHTML='记录日期：'+k+'<br>完成次数：'+items.length+' 次<br>连续天数：'+calcDayStreak(k)+' 天';els.weather.value=log.weather||'';els.timeline.innerHTML=items.length?items.map(function(i){var t=new Date(i.time);return'<div class="time-item">'+pad(t.getHours())+':'+pad(t.getMinutes())+' · '+i.emoji+' '+esc(i.name)+'</div>'}).join(''):'<div class="time-item">这天还没有完成记录</div>';els.diary.value=log.diary||''}
function calcDayStreak(k){var c=0,d=new Date(k+'T12:00:00');while(true){var kk=key(d),l=state.dailyLog[kk];if((l&&l.items&&l.items.length)||isRest(kk)){c++;d.setDate(d.getDate()-1)}else break}return c}
els.tabs.addEventListener('click',function(e){var b=e.target.closest('[data-mode]');if(!b)return;state.activeMode=b.dataset.mode;delete state.skipLog[today()];toast('已切换模式');render()});
els.calToggle.addEventListener('click',function(){calendarOpen=!calendarOpen;renderCal()});id('prevMonth').addEventListener('click',function(){viewMonth.setMonth(viewMonth.getMonth()-1);renderCal()});id('nextMonth').addEventListener('click',function(){viewMonth.setMonth(viewMonth.getMonth()+1);renderCal()});els.cal.addEventListener('click',function(e){var b=e.target.closest('[data-date]');if(b)openDrawer(b.dataset.date)});
els.input.addEventListener('keydown',function(e){if(e.key==='Enter')addHabit(e.target.value)});id('addBtn').addEventListener('click',function(){addHabit(els.input.value)});
els.push.addEventListener('click',function(e){if(e.target.id==='swapBtn')swap();if(e.target.id==='joinBtn')joinPush()});
els.list.addEventListener('click',function(e){var card=e.target.closest('.habit');if(!card)return;if(e.target.dataset.a==='remove')removeToday(card.dataset.id);else toggleHabit(card.dataset.id)});
id('closeDrawer').addEventListener('click',closeDrawer);els.overlay.addEventListener('click',closeDrawer);els.diary.addEventListener('input',function(){if(!activeDate)return;logFor(activeDate).diary=els.diary.value;save()});els.weather.addEventListener('input',function(){if(!activeDate)return;logFor(activeDate).weather=els.weather.value;save()});
els.ai.addEventListener('change',function(){state.settings.smart=els.ai.checked;render()});els.music.addEventListener('click',function(){if(els.bgm.paused){els.bgm.volume=.35;els.bgm.play().then(function(){els.music.classList.add('on')}).catch(function(){toast('请再点一次播放')})}else{els.bgm.pause();els.music.classList.remove('on')}});
render();
})();
</script>
</body>
</html>
