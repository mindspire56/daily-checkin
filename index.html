<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f6eee7">
<title>每日打卡</title>
<style>
*{box-sizing:border-box}html{min-height:100%}body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#332a28;background:#f6eee7;line-height:1.5}.app{min-height:100vh;background:radial-gradient(circle at 14% 8%,rgba(126,175,153,.28),transparent 28%),radial-gradient(circle at 92% 12%,rgba(222,139,111,.24),transparent 24%),linear-gradient(145deg,#fbf7f0,#efe7dc 58%,#e7efe6)}.wrap{width:min(1080px,100%);margin:0 auto;padding:28px 18px 110px}.top{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;align-items:stretch}.hero,.panel,.habit,.calendar,.log{background:rgba(255,255,255,.76);border:1px solid rgba(92,69,58,.08);box-shadow:0 14px 36px rgba(77,55,45,.08);backdrop-filter:blur(10px)}.hero{border-radius:24px;padding:24px;display:flex;flex-direction:column;justify-content:space-between;min-height:230px}.eyebrow{font-size:14px;color:#8c746b}.title{font-size:38px;line-height:1.08;margin:10px 0 8px;letter-spacing:0;font-weight:800}.date{font-size:15px;color:#7d6b65}.quote{margin-top:22px;font-size:16px;color:#5f514d}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{border-radius:18px;padding:16px;background:#fff8f2;border:1px solid rgba(190,139,107,.18)}.stat strong{display:block;font-size:30px;line-height:1.1;color:#d87048}.stat span{font-size:13px;color:#8c746b}.panel{border-radius:24px;padding:20px}.panel-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}.panel-title h2{font-size:18px;margin:0}.music{display:flex;gap:8px;align-items:center}.icon-btn,.primary,.ghost{border:0;cursor:pointer;font:inherit;transition:transform .15s ease,background .2s ease,box-shadow .2s ease}.icon-btn{width:42px;height:42px;border-radius:50%;background:#fff;color:#8a6c60;box-shadow:0 6px 18px rgba(80,54,44,.08)}.icon-btn:active,.primary:active,.ghost:active{transform:scale(.97)}.icon-btn.on{background:#df7951;color:#fff}.progress{height:14px;border-radius:99px;background:#eaded6;overflow:hidden}.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#df7951,#e9b15e,#8ebc9d);border-radius:inherit;transition:width .35s ease}.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.mini{padding:12px;border-radius:16px;background:#fff;color:#725d56}.mini b{display:block;font-size:22px;color:#3f322f}.add{display:grid;grid-template-columns:1fr 52px;gap:10px;margin-top:16px}.add input{width:100%;border:1px solid #dfd0c6;border-radius:16px;background:#fff;padding:14px 15px;font:inherit;outline:none;color:#332a28}.add input:focus{border-color:#d87048;box-shadow:0 0 0 4px rgba(216,112,72,.12)}.primary{border-radius:16px;background:#d87048;color:#fff;font-size:26px}.main{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px;margin-top:18px}.section-head{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px}.section-head h2{font-size:18px;margin:0}.ghost{border-radius:14px;padding:9px 12px;background:#fff;color:#7b655e}.list{display:grid;gap:10px}.habit{border-radius:20px;padding:14px;display:grid;grid-template-columns:46px 1fr auto auto;gap:12px;align-items:center}.emoji{width:46px;height:46px;border-radius:15px;background:#fff4ec;display:grid;place-items:center;font-size:25px}.habit.done{opacity:.64}.habit.done .name{text-decoration:line-through;color:#927c74}.name{font-weight:700;font-size:16px}.meta{font-size:13px;color:#806d66;margin-top:2px}.check{width:44px;height:44px;border-radius:50%;border:2px solid #dfd0c6;background:#fff;color:transparent;cursor:pointer;font-size:20px}.check.done{background:#7eaf99;border-color:#7eaf99;color:#fff}.delete{width:34px;height:34px;border-radius:50%;border:0;background:#fff;color:#bd8b7a;cursor:pointer}.empty{border-radius:22px;background:rgba(255,255,255,.74);padding:38px 18px;text-align:center;color:#806d66}.empty .spark{font-size:40px}.calendar{border-radius:22px;padding:16px}.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.cal-title{font-weight:800}.cal-nav{display:flex;gap:8px}.cal-grid,.week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.week{margin-bottom:6px;color:#90766b;font-size:12px;text-align:center}.day{min-height:38px;border-radius:12px;background:#fff;display:grid;place-items:center;font-size:13px;position:relative}.day.off{opacity:.32}.day.today{outline:2px solid rgba(216,112,72,.45)}.day.hit:after{content:"";position:absolute;bottom:6px;width:6px;height:6px;border-radius:50%;background:#7eaf99}.log{border-radius:22px;padding:16px;margin-top:18px}.log-list{display:grid;gap:9px;max-height:280px;overflow:auto}.log-item{border-radius:14px;background:#fff;padding:10px 12px;font-size:13px;color:#6d5a54}.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,80px);background:#332a28;color:#fff;padding:11px 18px;border-radius:14px;opacity:0;transition:.28s ease;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}.footer-nav{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);display:flex;gap:8px;background:rgba(255,255,255,.86);padding:8px;border:1px solid rgba(92,69,58,.08);border-radius:99px;box-shadow:0 12px 28px rgba(77,55,45,.12);backdrop-filter:blur(12px)}.footer-nav button{border:0;border-radius:99px;background:transparent;padding:9px 12px;color:#725d56;cursor:pointer;font:inherit}.footer-nav button.active{background:#332a28;color:#fff}@media(max-width:820px){.top,.main{grid-template-columns:1fr}.title{font-size:31px}.stats{grid-template-columns:repeat(4,1fr)}.stat{padding:12px}.stat strong{font-size:24px}.main{gap:14px}}@media(max-width:520px){.wrap{padding:20px 14px 104px}.hero,.panel{border-radius:20px;padding:18px}.stats{grid-template-columns:repeat(2,1fr)}.mini-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.mini{padding:10px}.habit{grid-template-columns:42px 1fr auto;gap:10px}.delete{grid-column:3}.emoji{width:42px;height:42px}.footer-nav{width:calc(100% - 28px);justify-content:space-between}.footer-nav button{font-size:13px;padding:9px 10px}}
</style>
</head>
<body>
<div class="app">
  <main class="wrap">
    <section class="top" id="home">
      <div class="hero">
        <div>
          <div class="eyebrow" id="greeting">今天也认真生活</div>
          <h1 class="title">每日打卡</h1>
          <div class="date" id="dateText"></div>
        </div>
        <div class="quote" id="quoteText"></div>
      </div>
      <aside class="panel">
        <div class="panel-title">
          <h2>今日进度</h2>
          <div class="music">
            <button class="icon-btn" id="musicBtn" title="背景音乐">♪</button>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><strong id="doneCount">0</strong><span>已完成</span></div>
          <div class="stat"><strong id="totalCount">0</strong><span>总习惯</span></div>
          <div class="stat"><strong id="monthCount">0</strong><span>本月打卡</span></div>
          <div class="stat"><strong id="bestCount">0</strong><span>最长连续</span></div>
        </div>
        <div class="mini-grid">
          <div class="mini"><b id="percentText">0%</b>完成率</div>
          <div class="mini"><b id="todayScore">0</b>今日积分</div>
          <div class="mini"><b id="allCount">0</b>累计</div>
        </div>
        <div class="progress" aria-label="今日完成进度"><span id="progressBar"></span></div>
        <div class="add">
          <input id="habitInput" maxlength="24" placeholder="添加新习惯..." autocomplete="off">
          <button class="primary" id="addBtn" title="添加">+</button>
        </div>
      </aside>
    </section>
    <section class="main">
      <div>
        <div class="section-head">
          <h2>习惯清单</h2>
          <button class="ghost" id="demoBtn">示例</button>
        </div>
        <div class="list" id="habitList"></div>
      </div>
      <aside>
        <div class="calendar" id="calendar">
          <div class="cal-top">
            <button class="icon-btn" id="prevMonth" title="上个月">‹</button>
            <div class="cal-title" id="calTitle"></div>
            <button class="icon-btn" id="nextMonth" title="下个月">›</button>
          </div>
          <div class="week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
        <div class="log" id="logs">
          <div class="section-head"><h2>最近日志</h2><button class="ghost" id="clearLogs">清空</button></div>
          <div class="log-list" id="logList"></div>
        </div>
      </aside>
    </section>
  </main>
  <nav class="footer-nav" aria-label="页面跳转">
    <button data-jump="home" class="active">首页</button>
    <button data-jump="calendar">日历</button>
    <button data-jump="logs">日志</button>
  </nav>
</div>
<audio id="bgm" loop preload="none"><source src="background.mp3" type="audio/mpeg"></audio>
<div class="toast" id="toast"></div>
<script>
(function(){
  var STORE='daily-checkin-v1';
  var quotes=['小小坚持，也会慢慢改变生活。','今天完成一点点，明天就轻一点。','把目标拆小，把坚持变成日常。','不是每一天都完美，但每一次打卡都算数。','认真生活的人，会被时间悄悄奖励。'];
  var weekdays=['日','一','二','三','四','五','六'];
  var emojiRules=[
    [['喝水','水','water'],'💧'],[['运动','跑步','健身','run','workout'],'🏃'],[['读书','阅读','book','read'],'📖'],[['学习','复习','英语','study'],'📚'],
    [['早睡','睡觉','sleep'],'🌙'],[['早起','起床'],'🌅'],[['写作','日记','write'],'✍️'],[['编程','code'],'💻'],[['音乐','听歌'],'🎵'],
    [['做饭','早餐','cook'],'🍳'],[['整理','收纳','clean'],'🧹'],[['护肤','skincare'],'🧴'],[['计划','目标','goal'],'🎯'],[['骑行','bike'],'🚲']
  ];
  var state=load();
  var viewMonth=new Date();
  var els={
    greeting:byId('greeting'),dateText:byId('dateText'),quoteText:byId('quoteText'),doneCount:byId('doneCount'),totalCount:byId('totalCount'),
    monthCount:byId('monthCount'),bestCount:byId('bestCount'),percentText:byId('percentText'),todayScore:byId('todayScore'),allCount:byId('allCount'),
    progressBar:byId('progressBar'),habitInput:byId('habitInput'),addBtn:byId('addBtn'),habitList:byId('habitList'),calTitle:byId('calTitle'),
    calGrid:byId('calGrid'),logList:byId('logList'),toast:byId('toast'),bgm:byId('bgm'),musicBtn:byId('musicBtn')
  };
  function byId(id){return document.getElementById(id)}
  function pad(n){return String(n).padStart(2,'0')}
  function key(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
  function monthKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)}
  function today(){return key(new Date())}
  function load(){
    try{
      var raw=localStorage.getItem(STORE);
      if(raw){
        var data=JSON.parse(raw);
        return {habits:data.habits||[],logs:data.logs||[],links:data.links||[],settings:data.settings||{}};
      }
    }catch(e){}
    return {habits:[],logs:[],links:[],settings:{music:false}};
  }
  function save(){localStorage.setItem(STORE,JSON.stringify(state))}
  function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function toast(msg){els.toast.textContent=msg;els.toast.classList.add('show');clearTimeout(els.toast._timer);els.toast._timer=setTimeout(function(){els.toast.classList.remove('show')},1800)}
  function emojiFor(name){
    var low=name.toLowerCase();
    for(var i=0;i<emojiRules.length;i++){
      for(var j=0;j<emojiRules[i][0].length;j++){if(low.indexOf(emojiRules[i][0][j].toLowerCase())>-1)return emojiRules[i][1]}
    }
    return '⭐';
  }
  function addLog(text){state.logs.unshift({id:Date.now(),time:new Date().toISOString(),text:text});state.logs=state.logs.slice(0,80)}
  function streak(history){
    var total=0,d=new Date();
    while(history[key(d)]){total++;d.setDate(d.getDate()-1)}
    return total;
  }
  function bestStreak(history){
    var days=Object.keys(history||{}).sort();if(!days.length)return 0;
    var best=1,run=1;
    for(var i=1;i<days.length;i++){
      var diff=(new Date(days[i])-new Date(days[i-1]))/86400000;
      if(diff===1){run++;best=Math.max(best,run)}else{run=1}
    }
    return best;
  }
  function monthHits(history){
    var mk=monthKey(new Date());
    return Object.keys(history||{}).filter(function(k){return k.indexOf(mk)===0}).length;
  }
  function allHits(history){return Object.keys(history||{}).length}
  function render(){
    var now=new Date(),tk=today();
    els.greeting.textContent=greeting(now);
    els.dateText.textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+weekdays[now.getDay()];
    els.quoteText.textContent=quotes[now.getDate()%quotes.length];
    var total=state.habits.length,done=0,month=0,best=0,all=0;
    state.habits.forEach(function(h){h.history=h.history||{};if(h.history[tk])done++;month+=monthHits(h.history);best=Math.max(best,bestStreak(h.history));all+=allHits(h.history)});
    var percent=total?Math.round(done/total*100):0;
    els.doneCount.textContent=done;els.totalCount.textContent=total;els.monthCount.textContent=month;els.bestCount.textContent=best;els.allCount.textContent=all;
    els.percentText.textContent=percent+'%';els.todayScore.textContent=done*10;els.progressBar.style.width=percent+'%';
    renderHabits(tk);renderCalendar();renderLogs();save();
  }
  function greeting(d){var h=d.getHours();if(h<6)return '夜深了，早点休息';if(h<9)return '早上好，开启新一天';if(h<12)return '上午好，稳稳推进';if(h<14)return '中午好，给自己充电';if(h<18)return '下午好，继续一点点';if(h<22)return '晚上好，别忘了打卡';return '今天辛苦了'}
  function renderHabits(tk){
    if(!state.habits.length){els.habitList.innerHTML='<div class="empty"><div class="spark">✨</div><p>还没有习惯，添加一个开始打卡吧</p></div>';return}
    els.habitList.innerHTML=state.habits.map(function(h){
      var done=!!(h.history&&h.history[tk]),s=streak(h.history||{}),b=bestStreak(h.history||{});
      return '<article class="habit '+(done?'done':'')+'" data-id="'+h.id+'"><div class="emoji">'+h.emoji+'</div><div><div class="name">'+escapeHtml(h.name)+'</div><div class="meta">'+(s?'连续 '+s+' 天':'今天开始积累')+(b>1?' · 最高 '+b+' 天':'')+'</div></div><button class="check '+(done?'done':'')+'" data-action="toggle" title="打卡">✓</button><button class="delete" data-action="delete" title="删除">×</button></article>';
    }).join('');
  }
  function renderCalendar(){
    var y=viewMonth.getFullYear(),m=viewMonth.getMonth(),first=new Date(y,m,1),start=first.getDay(),days=new Date(y,m+1,0).getDate(),tk=today();
    els.calTitle.textContent=y+'年'+(m+1)+'月';
    var hitMap={};
    state.habits.forEach(function(h){Object.keys(h.history||{}).forEach(function(k){hitMap[k]=true})});
    var html='';
    for(var i=0;i<start;i++)html+='<div class="day off"></div>';
    for(var d=1;d<=days;d++){
      var k=y+'-'+pad(m+1)+'-'+pad(d);
      html+='<div class="day '+(k===tk?'today ':'')+(hitMap[k]?'hit':'')+'">'+d+'</div>';
    }
    els.calGrid.innerHTML=html;
  }
  function renderLogs(){
    if(!state.logs.length){els.logList.innerHTML='<div class="log-item">暂无日志</div>';return}
    els.logList.innerHTML=state.logs.slice(0,18).map(function(l){
      var d=new Date(l.time);
      return '<div class="log-item">'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+' · '+escapeHtml(l.text)+'</div>';
    }).join('');
  }
  function addHabit(name){
    name=name.trim();if(!name)return;
    if(state.habits.some(function(h){return h.name===name})){toast('已经有这个习惯');return}
    var habit={id:Date.now(),name:name,emoji:emojiFor(name),history:{},logs:[]};
    state.habits.push(habit);addLog('添加习惯：'+name);els.habitInput.value='';toast('已添加');render();
  }
  function toggleHabit(id){
    var h=state.habits.find(function(x){return x.id===id});if(!h)return;
    h.history=h.history||{};var tk=today();
    if(h.history[tk]){delete h.history[tk];addLog('取消打卡：'+h.name);toast('已取消')}else{h.history[tk]=true;addLog('完成打卡：'+h.name);toast('打卡成功')}
    render();
  }
  function deleteHabit(id){
    var h=state.habits.find(function(x){return x.id===id});if(!h)return;
    state.habits=state.habits.filter(function(x){return x.id!==id});addLog('删除习惯：'+h.name);toast('已删除');render();
  }
  els.addBtn.addEventListener('click',function(){addHabit(els.habitInput.value)});
  els.habitInput.addEventListener('keydown',function(e){if(e.key==='Enter')addHabit(e.target.value)});
  els.habitList.addEventListener('click',function(e){
    var card=e.target.closest('.habit');if(!card)return;
    var id=Number(card.dataset.id),action=e.target.dataset.action;
    if(action==='delete')deleteHabit(id);else toggleHabit(id);
  });
  byId('prevMonth').addEventListener('click',function(){viewMonth.setMonth(viewMonth.getMonth()-1);renderCalendar()});
  byId('nextMonth').addEventListener('click',function(){viewMonth.setMonth(viewMonth.getMonth()+1);renderCalendar()});
  byId('demoBtn').addEventListener('click',function(){
    ['喝水','阅读20分钟','早睡'].forEach(function(n){if(!state.habits.some(function(h){return h.name===n}))state.habits.push({id:Date.now()+Math.random(),name:n,emoji:emojiFor(n),history:{},logs:[]})});
    addLog('添加示例习惯');toast('示例已加入');render();
  });
  byId('clearLogs').addEventListener('click',function(){state.logs=[];toast('日志已清空');render()});
  document.querySelector('.footer-nav').addEventListener('click',function(e){
    if(e.target.tagName!=='BUTTON')return;
    document.querySelectorAll('.footer-nav button').forEach(function(b){b.classList.remove('active')});e.target.classList.add('active');
    byId(e.target.dataset.jump).scrollIntoView({behavior:'smooth',block:'start'});
  });
  els.musicBtn.addEventListener('click',function(){
    if(els.bgm.paused){els.bgm.volume=.35;els.bgm.play().then(function(){els.musicBtn.classList.add('on');toast('音乐已开启')}).catch(function(){toast('请再点一次播放')})}
    else{els.bgm.pause();els.musicBtn.classList.remove('on');toast('音乐已暂停')}
  });
  render();
})();
</script>
</body>
</html>
